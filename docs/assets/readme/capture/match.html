<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Match</title>
<link rel="stylesheet" href="_base.css" />
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status"><span>9:41</span><span>Seeker</span></div>
  <div class="screen match-body">
    <div class="lbl" style="color:var(--accent)">Mutual like</div>
    <div class="match-h">It's a match</div>
    <div class="sub" style="margin-top:6px">You and Nova liked each other</div>
    <div class="avs">
      <div class="av-wrap"><img class="av" src="./assets/you.jpg" alt="" /></div>
      <div class="mlink">✓</div>
      <div class="av-wrap r"><img class="av" src="./assets/nova.jpg" alt="" /></div>
    </div>
    <div class="score-box">
      <div class="score-n">94%</div>
      <div class="score-l">compatibility · Elo-weighted</div>
    </div>
    <button class="btn">Send a message</button>
    <button class="btn-s">Keep browsing</button>
  </div>
</div>
</body>
</html>
