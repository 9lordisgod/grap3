<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Discover</title>
<link rel="stylesheet" href="_base.css" />
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status"><span>9:41</span><span>Seeker</span></div>
  <div class="screen">
    <div class="disc-hd">
      <div><div class="lbl">Discover</div><div class="h">Tonight</div></div>
      <div class="remain"><div class="lbl">Left</div><div class="remain-n">3</div></div>
    </div>
    <div class="card" style="background-image:url('./assets/nova.jpg')">
      <div class="shade"></div>
      <div class="trust">◆ Trust 92</div>
      <div class="pinfo">
        <div class="pname">Nova<span class="page">, 27</span></div>
        <div class="pbio">Solana dev · DeFi native · Seeker owner</div>
        <div class="tags"><span class="tag">DeFi</span><span class="tag">Anchor</span><span class="tag">Seeker</span></div>
        <div class="compat">94% compatible</div>
      </div>
    </div>
    <div class="acts">
      <div class="act" style="color:var(--red)">×</div>
      <div class="act" style="color:var(--txt2)">↑</div>
      <div class="act act-like">♥</div>
    </div>
    <div class="tabbar"><div class="tab on">Discover</div><div class="tab">Matches</div><div class="tab">Profile</div></div>
  </div>
</div>
</body>
</html>
