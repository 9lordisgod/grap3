<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Grap3 icon box</title>
<link rel="stylesheet" href="./logo-box.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 176px;
    height: 176px;
    overflow: hidden;
    background: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
</style>
</head>
<body>
  <div class="logo-box logo-box--lg">
    <img src="./logo.png" alt="Grap3" />
  </div>
</body>
</html>
